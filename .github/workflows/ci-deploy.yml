name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.img.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare image reference
        id: img
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          IMAGE_REF="ghcr.io/${REPO_LC}-backend:${GITHUB_SHA}"
          echo "REPO_LC=$REPO_LC" >> "$GITHUB_ENV"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ghcr.io/${{ env.REPO_LC }}-backend:latest

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.img.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare image reference
        id: img
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          IMAGE_REF="ghcr.io/${REPO_LC}-web:${GITHUB_SHA}"
          echo "REPO_LC=$REPO_LC" >> "$GITHUB_ENV"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Build and push web frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ghcr.io/${{ env.REPO_LC }}-web:latest

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://fibeger.com
    needs: [build-backend, build-web]
    env:
      BACKEND_IMAGE_REF: ${{ needs.build-backend.outputs.image_ref }}
      WEB_IMAGE_REF: ${{ needs.build-web.outputs.image_ref }}
      SERVER_TS_HOST: 100.119.236.64
      REMOTE_COMPOSE_DIR: /opt/fibeger
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_SECRET }}
          tags: tag:ci

      - name: Wait for tailnet propagation
        run: sleep 5

      - name: Remote deploy via Tailscale SSH
        shell: bash
        run: |
          set -euo pipefail
          tailscale ssh deploy@${SERVER_TS_HOST} bash -s <<REMOTE_EOF
          set -euo pipefail
          echo "${GHCR_READ_PAT}" | podman login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

          echo "Pulling backend: ${BACKEND_IMAGE_REF}"
          podman pull "${BACKEND_IMAGE_REF}"
          echo "Pulling web: ${WEB_IMAGE_REF}"
          podman pull "${WEB_IMAGE_REF}"

          cd "${REMOTE_COMPOSE_DIR}"

          if [ -d .git ]; then
            git pull origin main
          fi

          sed -i "s|^BACKEND_IMAGE_REF=.*|BACKEND_IMAGE_REF=${BACKEND_IMAGE_REF}|" .env
          sed -i "s|^WEB_IMAGE_REF=.*|WEB_IMAGE_REF=${WEB_IMAGE_REF}|" .env

          export BACKEND_IMAGE_REF="${BACKEND_IMAGE_REF}"
          export WEB_IMAGE_REF="${WEB_IMAGE_REF}"

          if command -v podman-compose >/dev/null 2>&1; then
            podman-compose pull || true
            podman-compose up -d --remove-orphans
          fi
          REMOTE_EOF
        env:
          BACKEND_IMAGE_REF: ${{ needs.build-backend.outputs.image_ref }}
          WEB_IMAGE_REF: ${{ needs.build-web.outputs.image_ref }}
          REMOTE_COMPOSE_DIR: ${{ env.REMOTE_COMPOSE_DIR }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_READ_PAT: ${{ secrets.GHCR_PAT }}
          SERVER_TS_HOST: ${{ env.SERVER_TS_HOST }}
